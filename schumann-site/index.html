<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Schumann Resonance Live Monitor</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>Schumann Resonance Live Monitor</h1>
    <div>
      Live Time: <span id="tomsk-time">--:--:--</span>
    </div>
  </header>

  <section>

    <!-- Chart 1 -->
    <div>
      <div id="loader0">Loading...</div>
      <img id="img0" alt="Schumann 1" />
      <div id="err0">Failed to load</div>
    </div>

    <!-- Chart 2 -->
    <div>
      <div id="loader1">Loading...</div>
      <img id="img1" alt="Schumann 2" />
      <div id="err1">Failed to load</div>
    </div>

    <!-- Chart 3 -->
    <div>
      <div id="loader2">Loading...</div>
      <img id="img2" alt="Schumann 3" />
      <div id="err2">Failed to load</div>
    </div>

  </section>

  <button id="refresh-btn" onclick="refreshAll()">Refresh</button>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Initializing...</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
